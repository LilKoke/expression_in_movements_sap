# Approach A: expert features + RandomForest.
# Swap to approach B by pointing `expr-train --config` at experiment_lstm.yaml.
name: rf
seed: 42

data:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  trim_start_frames: 0
  trim_end_frames: 0

window:                   # fixed-length sliding window; prediction unit
  length: 64              # <= shortest clip (~73 frames) to avoid padding
  stride: 16

split:
  # LOSO = the real inter-subject task (4 subjects -> 4 folds). Swap to
  # `intra_subject` to reproduce the source paper's within-subject >90%.
  strategy: leave_one_subject_out
  n_splits: 4
  seed: 42

model:
  name: random_forest
  params:
    n_estimators: 300
    max_depth: null
    random_state: 42
