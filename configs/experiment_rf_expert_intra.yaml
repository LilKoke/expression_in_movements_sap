# Approach A: expert features + RandomForest, intra-subject protocol.
name: rf_expert_intra
seed: 42

data:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  trim_start_frames: 0
  trim_end_frames: 0

window:
  length: 64
  stride: 16

split:
  strategy: intra_subject
  n_splits: 4
  seed: 42

model:
  name: random_forest_expert
  params:
    n_estimators: 300
    max_depth: null
    random_state: 42
    features_path: data/processed/features.parquet
