# Approach B (headline): multi-task NN with a 1D-CNN encoder (Phase 5, #14).
#   window -> [1D-CNN encoder] -> latent z -+-> [decoder] -> reconstruction (MSE)
#                                           +-> [head]    -> emotion        (cross-entropy)
#   total = alpha * reconstruction + beta * classification
# The latent z is the representation PCA-visualised in Phase 7. Speed (the last
# feature channel) is concatenated onto z rather than fed through the encoder.
# Same data + window + split as experiment_rf.yaml so the A-vs-B comparison is fair.
name: cnn1d
seed: 42

data:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  trim_start_frames: 0
  trim_end_frames: 0

window:                   # same windowing as experiment_rf.yaml -> fair A-vs-B
  length: 64
  stride: 16

split:                    # same folds as experiment_rf.yaml -> fair A-vs-B
  strategy: leave_one_subject_out
  n_splits: 4
  seed: 42

model:
  name: cnn1d
  params:
    encoder: cnn1d
    latent_dim: 32        # PCA-visualised latent dimensionality (Phase 7)
    hidden_size: 64
    kernel_size: 5
    dropout: 0.2
    alpha: 1.0            # reconstruction-loss weight
    beta: 1.0             # classification-loss weight
    lr: 0.001
    epochs: 40
    batch_size: 32
    random_state: 42
