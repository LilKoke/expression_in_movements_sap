# Approach B: neural network (LSTM) on raw pose sequences.
# Same data + split as experiment_rf.yaml so the A-vs-B comparison is fair.
name: lstm
seed: 42

data:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  trim_start_frames: 0
  trim_end_frames: 0

split:
  strategy: group_kfold   # subject-grouped — required to avoid leakage
  n_splits: 5
  seed: 42

model:
  name: lstm
  params:
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    lr: 0.001
    epochs: 50
    batch_size: 32
    random_state: 42
