# Approach B (comparison baseline): multi-task NN with an LSTM encoder.
# Same data + window + split as experiment_rf.yaml / experiment_cnn1d.yaml so the
# A-vs-B and CNN-vs-RNN comparisons are all fair (identical folds & windows).
# The headline model is experiment_cnn1d.yaml; this is the RNN alternative the
# roadmap keeps for encoder comparison.
name: lstm
seed: 42

data:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  trim_start_frames: 0
  trim_end_frames: 0

window:                   # same windowing as the other configs -> fair comparison
  length: 64
  stride: 16

split:                    # same folds -> fair comparison
  strategy: leave_one_subject_out
  n_splits: 4
  seed: 42

model:
  name: lstm
  params:
    encoder: lstm
    latent_dim: 32        # PCA-visualised latent dimensionality (Phase 7)
    hidden_size: 64
    dropout: 0.2
    alpha: 1.0            # reconstruction-loss weight
    beta: 1.0             # classification-loss weight
    lr: 0.001
    epochs: 40
    batch_size: 32
    random_state: 42
